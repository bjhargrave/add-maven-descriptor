name: "CI Build"

on:
  push:
    branches-ignore:
      - 'dependabot/**'
    paths:
      - '**'
      - '!docs/**'
      - '!.github/**'
      - '.github/**/*ci*'
  pull_request:
    paths:
      - '**'
      - '!docs/**'
      - '!.github/**'
      - '.github/**/*ci*'

env:
  LC_ALL: en_US.UTF-8
  GRADLE_OPTS: >-
    -Dorg.gradle.parallel=true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: ${{ (github.repository != 'bjhargrave/add-maven-descriptor') || ((github.ref != 'refs/heads/main') && (github.ref != 'refs/heads/release')) || (github.event_name == 'pull_request') }}
      matrix:
        os:
          - 'ubuntu-latest'
        build:
          - java: '17'
        test:
          - java: '17'
          - java: '21'
          - java: '25'
    name: "Build JDK${{ matrix.build.java }} / Test JDK${{ matrix.test.java }}"
    runs-on: ${{ matrix.os }}
    steps:
      - name: "Harden Runner"
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          disable-sudo-and-containers: true
          egress-policy: block
          allowed-endpoints: >
            downloads.gradle.org:443
            github.com:443
            jcenter.bintray.com:443
            objects.githubusercontent.com:443
            plugins-artifacts.gradle.org:443
            plugins.gradle.org:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            services.gradle.org:443

      - name: "Git Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Setup Java"
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: |
            ${{ matrix.test.java != matrix.build.java && matrix.test.java || '' }}
            ${{ matrix.build.java }}

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: 'basic'
          cache-read-only: ${{ github.ref != 'refs/heads/main' || matrix.test.java != matrix.build.java }}

      - name: "Build"
        id: build
        run: |
          ./gradlew build -Ptest.target="${{ matrix.test.java }}"

  dependency-submission:
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    strategy:
      matrix:
        os:
          - 'ubuntu-latest'
        java:
          - '17'
    name: "Submit Dependencies"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          disable-sudo-and-containers: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            jcenter.bintray.com:443
            objects.githubusercontent.com:443
            plugins-artifacts.gradle.org:443
            plugins.gradle.org:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            services.gradle.org:443

      - name: "Git Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Setup Java ${{ matrix.java }}"
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: "Generate and submit dependency graph"
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: 'basic'
          cache-read-only: true
