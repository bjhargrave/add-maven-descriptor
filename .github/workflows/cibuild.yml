name: "CI Build"

on:
  push:
    branches-ignore:
      - 'dependabot/**'
    paths:
      - '**'
      - '!docs/**'
      - '!.github/**'
      - '.github/**/*ci*'
  pull_request:
    paths:
      - '**'
      - '!docs/**'
      - '!.github/**'
      - '.github/**/*ci*'

env:
  LC_ALL: en_US.UTF-8
  GRADLE_OPTS: >-
    -Dorg.gradle.parallel=true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: ${{ (github.repository != 'bjhargrave/add-maven-descriptor') || ((github.ref != 'refs/heads/main') && (github.ref != 'refs/heads/release')) || (github.event_name == 'pull_request') }}
      matrix:
        os:
          - 'ubuntu-latest'
        build:
          - java: '17'
        test:
          - java: '17'
          - java: '21'
          - java: '25'
    name: "Build JDK${{ matrix.build.java }} / Test JDK${{ matrix.test.java }}"
    runs-on: ${{ matrix.os }}
    steps:
      - name: "Harden Runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo-and-containers: true
          egress-policy: block
          allowed-endpoints: >
            downloads.gradle.org:443
            github.com:443
            jcenter.bintray.com:443
            objects.githubusercontent.com:443
            plugins-artifacts.gradle.org:443
            plugins.gradle.org:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            services.gradle.org:443

      - name: "Git Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Setup Java"
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: |
            ${{ matrix.test.java != matrix.build.java && matrix.test.java || '' }}
            ${{ matrix.build.java }}

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: 'basic'
          cache-read-only: ${{ github.ref != 'refs/heads/main' || matrix.test.java != matrix.build.java }}

      - name: "Build"
        id: build
        run: |
          ./gradlew build -Ptest.target="${{ matrix.test.java }}"
