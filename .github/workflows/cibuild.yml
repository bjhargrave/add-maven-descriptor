name: "CI Build"

on:
  push:
    branches-ignore:
      - 'dependabot/**'
    paths:
      - '**'
      - '!docs/**'
      - '!.github/**'
      - '.github/**/*ci*'
  pull_request:
    paths:
      - '**'
      - '!docs/**'
      - '!.github/**'
      - '.github/**/*ci*'

env:
  LC_ALL: en_US.UTF-8
  GRADLE_OPTS: >-
    -Dorg.gradle.parallel=true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: ${{ (github.repository != 'bjhargrave/add-maven-descriptor') || ((github.ref != 'refs/heads/main') && (github.ref != 'refs/heads/release')) || (github.event_name == 'pull_request') }}
      matrix:
        os:
          - 'ubuntu-latest'
        build:
          - java: '17'
        test:
          - java: '17'
          - java: '21'
          - java: '25'
    name: "Build JDK${{ matrix.build.java }} / Test JDK${{ matrix.test.java }}"
    runs-on: ${{ matrix.os }}
    steps:
      - name: "Harden Runner"
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          disable-sudo-and-containers: true
          egress-policy: block
          allowed-endpoints: >
            downloads.gradle.org:443
            github.com:443
            jcenter.bintray.com:443
            objects.githubusercontent.com:443
            plugins-artifacts.gradle.org:443
            plugins.gradle.org:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            services.gradle.org:443

      - name: "Git Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Java"
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: |
            ${{ matrix.test.java != matrix.build.java && matrix.test.java || '' }}
            ${{ matrix.build.java }}

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-provider: 'basic'
          cache-read-only: ${{ github.ref != 'refs/heads/main' || matrix.test.java != matrix.build.java }}

      - name: "Build"
        id: build
        run: |
          ./gradlew build -Ptest.target="${{ matrix.test.java }}"
